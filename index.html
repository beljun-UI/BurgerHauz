<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burger Hauz</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="icon" type="image/png" href="src/images/burger_hauz.png">
  </head>
  <body>
    <header class="main-header">
      <div class="logo"><img src="src/images/burger_hauz.png" alt="Burger Hauz Logo" class="logo-icon"> Burger Hauz</div>
      <nav class="main-nav">
        <a href="#home" class="nav-link active">Home</a>
        <a href="#article" class="nav-link">Article</a>
        <a href="#contact" class="nav-link">Contact Us</a>
      </nav>
      <div class="nav-toggle" id="navToggle">
        <i class="fas fa-bars"></i>
      </div>
</header>

    <main>
      <section id="home" class="hero-section">
        <div class="container hero-content-wrapper">
          <div class="hero-text">
            <h1>The Burger Story.</h1>
            <p>
              Experience handcrafted burgers made with fresh, locally-sourced
              ingredients and a passion for perfection.
            </p>
            <a href="#article" class="btn primary-btn">See Article</a>
          </div>
          <div class="hero-image">
            <img src="src/images/hero_burger_right.png" alt="Delicious Gourmet Burger" />
          </div>
        </div>
      </section> 
  </body>    
</html>
